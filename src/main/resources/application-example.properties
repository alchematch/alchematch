spring.application.name=jobs
server.port=8080

# ── Datasource ───────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/jobsPortal
spring.datasource.username=YOUR_DB_USERNAME
spring.datasource.password=YOUR_DB_PASSWORD

# ── Flyway ───────────────────────────────────────────────────────────────────
# Schema is owned by Flyway. V1__init_schema.sql bootstraps a clean database.
# To start fresh: drop the DB, recreate it, then boot the app — Flyway runs V1.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false
spring.flyway.clean-disabled=true

# ── JPA ──────────────────────────────────────────────────────────────────────
# validate: Hibernate checks entity mappings against the Flyway-managed schema.
# No DDL is emitted by Hibernate. All schema changes must go through migrations.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.default_batch_fetch_size=50

# ── JWT ──────────────────────────────────────────────────────────────────────
app.jwt.secret=YOUR_JWT_SECRET_AT_LEAST_32_CHARS
app.jwt.expiration-ms=86400000

# ── Super admin bootstrap ────────────────────────────────────────────────────
# Set enabled=true on a fresh database to seed the first admin user.
# Leave enabled=false (or omit) in any environment where the admin already exists.
# Never commit real credentials here — put them in your local application.properties
# (which is git-ignored).
app.bootstrap.admin.enabled=false
app.bootstrap.admin.username=CHANGE_ME
app.bootstrap.admin.email=CHANGE_ME@example.com
app.bootstrap.admin.password=CHANGE_ME_USE_A_STRONG_PASSWORD

# ── CORS ─────────────────────────────────────────────────────────────────────
app.frontend.url=http://localhost:3000
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000

# ── Mail (local SMTP — e.g. MailHog or Gmail app password) ───────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_EMAIL@gmail.com
spring.mail.password=YOUR_GMAIL_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
